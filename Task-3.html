<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Scene</title>
</head>
<body style="background-color: white;">

<fieldset>
    <legend style="color: white;"></legend>


<svg height="700" width="1460">

    <rect x="0" y="0" width="1450" height="300" fill="lightblue"></rect>

    <rect x="0" y="300" width="1450" height="500" fill="green"></rect>

    <circle cx="180" cy="240" r="40" fill="orange"></circle>

    <polygon points="0,300 120,180 150,300" fill="brown"></polygon>

    <polygon points="150,300 180,240 220,300" fill="brown"></polygon>

    <polygon points="180,300 300,160 420,300" fill="brown"></polygon>

</svg>


</fieldset>

</body>
</html>
