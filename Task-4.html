<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Design</title>
</head>
<body style="background-color: wheat;">



<svg height="600" width="600">

<rect x="0" y="0" width="600" height="600" fill="#e6e2b3"></rect>
<rect x="50" y="50" width="500" height="500" fill="#e0a3a8"></rect>

<rect x="50" y="50" width="40" height="40" fill="green"></rect>
<rect x="510" y="50" width="40" height="40" fill="green"></rect>
<rect x="50" y="510" width="40" height="40" fill="green"></rect>
<rect x="510" y="510" width="40" height="40" fill="green"></rect>

<rect x="90" y="90" width="60" height="60" fill="#f5f0c5"></rect>
<rect x="450" y="90" width="60" height="60" fill="#f5f0c5"></rect>
<rect x="90" y="450" width="60" height="60" fill="#f5f0c5"></rect>
<rect x="450" y="450" width="60" height="60" fill="#f5f0c5"></rect>

<rect x="200" y="200" width="200" height="200" fill="#e0a3a8"></rect>

<rect x="151" y="150" width="50" height="50" fill="green"></rect>
<rect x="200" y="150" width="50" height="50" fill="black"></rect>
<rect x="250" y="150" width="50" height="50" fill="red"></rect>
<rect x="300" y="150" width="50" height="50" fill="red"></rect>
<rect x="350" y="150" width="50" height="50" fill="black"></rect>
<rect x="400" y="150" width="50" height="50" fill="green"></rect>

<rect x="200" y="400" width="50" height="50" fill="black"></rect>
<rect x="250" y="400" width="50" height="50" fill="red"></rect>
<rect x="300" y="400" width="50" height="50" fill="red"></rect>
<rect x="350" y="400" width="50" height="50" fill="black"></rect>
<rect x="400" y="400" width="50" height="50" fill="green"></rect>

<rect x="150" y="400" width="50" height="50" fill="green"></rect>


<rect x="150" y="200" width="50" height="50" fill="black"></rect>
<rect x="150" y="250" width="50" height="50" fill="red"></rect>
<rect x="150" y="300" width="50" height="50" fill="red"></rect>
<rect x="150" y="350" width="50" height="50" fill="black"></rect>



<rect x="400" y="200" width="50" height="50" fill="black"></rect>
<rect x="400" y="250" width="50" height="50" fill="red"></rect>
<rect x="400" y="300" width="50" height="50" fill="red"></rect>
<rect x="400" y="350" width="50" height="50" fill="black"></rect>



</svg>



</body>
</html>
